# SFT training hyperparameters.
num_train_epochs: 3
learning_rate: 1.0e-4
warmup_ratio: 0.1
weight_decay: 0.01
max_seq_length: 2048   # was 4096. Verified: full sweep of train(6308)+val(701), max=1865, 0 truncations
load_in_4bit: true

optim: "adamw_8bit"
lr_scheduler_type: "cosine"
max_grad_norm: 1.0

# Logging & checkpointing
logging_steps: 1
save_steps: 50
eval_steps: 50
eval_strategy: "steps"
save_total_limit: 3
load_best_model_at_end: true
metric_for_best_model: "eval_loss"
greater_is_better: false
early_stopping_patience: 4

# LoRA configuration
lora:
  r: 16
  alpha: 16
  dropout: 0.05
  target_modules: "all-linear"

# Vision-specific
finetune_vision_layers: false
finetune_language_layers: true
finetune_attention_modules: true
finetune_mlp_modules: true
use_gradient_checkpointing: "unsloth"

# Precision
bf16: true


use_resolution_bucketing: false        # CHANGED: dropped in favor of stratified rare-class sampling
use_stratified_rare_sampling: true     # NEW
bucket_shuffle_seed: 42

# --- Oversampling (new) ---
oversample_rule24_multiplier: 4        # Rule 2 or Rule 4 present -> 4 total copies
oversample_rule3_multiplier: 2         # Rule 3 present (and not 2/4) -> 2 total copies

# --- Memory-safety additions (new) ---
auto_find_batch_size: false           # HF Trainer will halve batch size on CUDA OOM at startup
image_min_pixels: 200704              # ~448x448 floor (Qwen patch-aligned)
image_max_pixels: 1204224             # ~1097x1097 cap -> neutralizes the 4K/14MP outliers you found

# --- Crash-safety additions (new) ---
best_model_subdir: "best"             # saved incrementally on every eval improvement, not just at the end
log_gpu_memory_every_n_steps: 20
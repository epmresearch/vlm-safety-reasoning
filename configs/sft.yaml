# replace fully
# SFT training hyperparameters.
num_train_epochs: 3
learning_rate: 2.0e-4
warmup_ratio: 0.03
weight_decay: 0.01
max_seq_length: 4096
load_in_4bit: true

optim: "adamw_8bit"
lr_scheduler_type: "cosine"
max_grad_norm: 1.0

# Logging & checkpointing
logging_steps: 10
save_steps: 100
eval_steps: 100
eval_strategy: "steps"
save_total_limit: 3
load_best_model_at_end: true
metric_for_best_model: "eval_loss"
greater_is_better: false
early_stopping_patience: 6     # set to null to disable

# LoRA configuration
lora:
  r: 16
  alpha: 16
  dropout: 0
  target_modules: "all-linear"

# Vision-specific
finetune_vision_layers: false
finetune_language_layers: true
finetune_attention_modules: true
finetune_mlp_modules: true
use_gradient_checkpointing: "unsloth"

# Precision
bf16: true

# --- Memory-safety additions (new) ---
auto_find_batch_size: true            # HF Trainer will halve batch size on CUDA OOM at startup
image_min_pixels: 200704              # ~448x448 floor (Qwen patch-aligned)
image_max_pixels: 1204224             # ~1097x1097 cap -> neutralizes the 4K/14MP outliers you found
use_resolution_bucketing: true        # bucket by 'resolution' column to avoid padding blowups
bucket_shuffle_seed: 42

# --- Crash-safety additions (new) ---
best_model_subdir: "best"             # saved incrementally on every eval improvement, not just at the end
manifest_update_every_eval: true
log_gpu_memory_every_n_steps: 20

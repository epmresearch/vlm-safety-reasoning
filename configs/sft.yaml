lr: 2.0e-4
epochs: 3
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
warmup_ratio: 0.03
weight_decay: 0.01
logging_steps: 10
save_steps: 100
eval_steps: 100

lora:
  r: 16
  alpha: 16
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

max_seq_length: 2048
load_in_4bit: true
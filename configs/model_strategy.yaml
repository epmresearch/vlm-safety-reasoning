# THE decision switch. Change this one value once the strategy is finalized.
# "multi_size"       -> fine-tune small/medium/large variants of ONE model family
#                       on ALL tasks, for a size-comparison study.
# "task_specialized" -> fine-tune ONE dedicated model per task.
strategy: "task_specialized"

# Used when strategy == "multi_size"
multi_size:
  base_family: "Qwen/Qwen2.5-VL"
  variants:
    small: "Qwen/Qwen2.5-VL-3B-Instruct"
    medium: "Qwen/Qwen2.5-VL-7B-Instruct"
    large: "Qwen/Qwen2.5-VL-32B-Instruct"

# Used when strategy == "task_specialized"
task_specialized:
  rule_violation: "Qwen/Qwen2.5-VL-7B-Instruct"
  captioning: "Qwen/Qwen2.5-VL-7B-Instruct"
  grounding: "Qwen/Qwen2.5-VL-7B-Instruct"
  attributes: "Qwen/Qwen2.5-VL-7B-Instruct"
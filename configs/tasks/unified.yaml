task_name: "full_unified"
prompt_key: "UNIFIED_INSPECTION_PROMPT"

# Output format: minimized JSON wrapped in ```json ... ``` code fences.
# No indentation, no extra whitespace. Single-line JSON body.
output_format: "fenced_minimized_json"

reward_weights:      # unused until GRPO phase;
  json_validity: 1.0
  caption_quality: 1.0
  rule_violation_accuracy: 2.0
  rule_grounding_iou: 1.0
  object_grounding_iou: 1.5

max_new_tokens: 1000   # single response covers caption + objects + violations
inference_max_seq_length: 2816   # NEW. Verified: full sweep of test(3004) prompt-only, max=1519+1000gen+margin=2770
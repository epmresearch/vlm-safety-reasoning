num_generations: 8
max_prompt_length: 1024
max_completion_length: 256
learning_rate: 1.0e-6
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
num_train_epochs: 1
logging_steps: 5
save_steps: 50
beta: 0.04            # KL penalty coefficient
use_gspo: false        # set true to use sequence-level (GSPO-style) importance ratio instead of token-level GRPO